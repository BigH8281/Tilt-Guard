<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilt Guard</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0e141a;
        --panel: #18222c;
        --panel-alt: #11181f;
        --border: #2b3a48;
        --text: #e6edf3;
        --muted: #91a3b5;
        --accent: #80d49b;
      }

      body {
        margin: 0;
        min-width: 360px;
        background: linear-gradient(180deg, var(--bg), #0a1015);
        color: var(--text);
        font: 13px/1.4 "Segoe UI", sans-serif;
      }

      main {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }

      h1,
      h2 {
        margin: 0 0 8px;
      }

      h1 {
        font-size: 16px;
      }

      h2 {
        font-size: 13px;
      }

      .summary {
        color: var(--muted);
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .meta-item {
        display: grid;
        gap: 2px;
      }

      .meta-item span {
        color: var(--muted);
        font-size: 11px;
      }

      .meta-item strong {
        word-break: break-word;
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        font: inherit;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        background: var(--accent);
        color: #09130d;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: #2b3641;
        color: var(--text);
      }

      button:disabled {
        opacity: 0.65;
        cursor: default;
      }

      pre {
        margin: 0;
        background: var(--panel-alt);
        border-radius: 10px;
        padding: 10px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Tilt Guard</h1>
        <div id="summary" class="summary">Loading extension status...</div>
      </section>

      <section>
        <h2>Connection</h2>
        <div class="grid">
          <div class="meta-item"><span>Auth</span><strong id="authStateValue">Loading...</strong></div>
          <div class="meta-item"><span>User</span><strong id="authUserValue">Loading...</strong></div>
          <div class="meta-item"><span>Synced</span><strong id="authSyncedAtValue">Loading...</strong></div>
          <div class="meta-item"><span>Session</span><strong id="sessionStatusValue">Loading...</strong></div>
        </div>
        <div class="row" style="margin-top: 10px">
          <button id="connectButton">Connect App</button>
          <button id="disconnectButton" class="secondary">Disconnect</button>
        </div>
      </section>

      <section>
        <h2>Monitoring</h2>
        <div class="grid">
          <div class="meta-item"><span>State</span><strong id="extensionStateValue">Loading...</strong></div>
          <div class="meta-item"><span>Monitoring</span><strong id="monitoringStateValue">Loading...</strong></div>
          <div class="meta-item"><span>TradingView</span><strong id="tradingViewValue">Loading...</strong></div>
          <div class="meta-item"><span>Broker</span><strong id="brokerValue">Loading...</strong></div>
          <div class="meta-item"><span>Adapter</span><strong id="adapterValue">Loading...</strong></div>
          <div class="meta-item"><span>Latest telemetry</span><strong id="freshnessValue">Loading...</strong></div>
        </div>
        <div class="meta-item" style="margin-top: 10px">
          <span>Warning</span>
          <strong id="warningValue">None</strong>
        </div>
        <div class="row" style="margin-top: 10px">
          <button id="refreshButton" class="secondary">Refresh</button>
          <button id="flushButton" class="secondary">Flush Telemetry</button>
        </div>
      </section>

      <section>
        <h2>Debug snapshot</h2>
        <pre id="statusBody">No status yet.</pre>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
