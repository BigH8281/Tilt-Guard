<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tilt Guard Telemetry</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #192028;
        --panel-2: #222c36;
        --text: #e6edf3;
        --muted: #92a2b2;
        --accent: #68d391;
        --warn: #f6ad55;
      }

      body {
        margin: 0;
        min-width: 340px;
        font: 13px/1.4 "Segoe UI", sans-serif;
        background: linear-gradient(180deg, var(--bg), #0c1014);
        color: var(--text);
      }

      main {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      section {
        background: var(--panel);
        border: 1px solid #2d3748;
        border-radius: 10px;
        padding: 12px;
      }

      h1, h2 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      h1 {
        font-size: 16px;
      }

      button {
        font: inherit;
        border: 0;
        border-radius: 8px;
        padding: 8px 10px;
        background: var(--accent);
        color: #08120d;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .secondary {
        background: #2d3748;
        color: var(--text);
      }

      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .muted {
        color: var(--muted);
      }

      .mono {
        font-family: "SFMono-Regular", Consolas, monospace;
        word-break: break-word;
      }

      .meta-list {
        display: grid;
        gap: 8px;
        margin-bottom: 10px;
      }

      .meta-item {
        display: grid;
        gap: 2px;
      }

      .meta-item strong {
        font-size: 12px;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Tilt Guard Telemetry</h1>
        <div id="summary" class="muted">Loading status...</div>
      </section>

      <section>
        <h2>Connection</h2>
        <div class="meta-list">
          <div class="meta-item"><span class="muted">Mode</span><strong id="modeValue">Loading...</strong></div>
          <div class="meta-item"><span class="muted">API</span><strong id="apiBaseUrlValue">Loading...</strong></div>
          <div class="meta-item"><span class="muted">Journal</span><strong id="appBaseUrlValue">Loading...</strong></div>
          <div class="meta-item"><span class="muted">Auth</span><strong id="authStateValue">Loading...</strong></div>
          <div class="meta-item"><span class="muted">User</span><strong id="authUserValue">Loading...</strong></div>
          <div class="meta-item"><span class="muted">Synced</span><strong id="authSyncedAtValue">Loading...</strong></div>
        </div>
        <div class="row">
          <button id="connectButton">Connect Journal</button>
          <button id="disconnectButton" class="secondary">Disconnect</button>
          <button id="flushButton" class="secondary">Flush Now</button>
        </div>
      </section>

      <section>
        <h2>Latest Observation</h2>
        <div id="statusBody" class="mono muted">No status yet.</div>
      </section>

      <section>
        <h2>Queue</h2>
        <div id="queueBody" class="mono muted">Queue unknown.</div>
      </section>
    </main>
    <script type="module" src="./index.js"></script>
  </body>
</html>
